name: My First GitHub Actions

on: [push]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        # Skip upgrading pip to save time; install pytest directly
        python3 -m pip install pytest --break-system-packages

    - name: Run tests
      run: |
        # Using python3 -m pytest is more reliable on self-hosted runners
        python3 -m pytest -s src/addition.py
